kind = "web"
previewPath = "/"
title = "AI Proxy Dashboard"
version = "1.0.0"
id = "artifacts/proxy-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 19585

[services.development]
run = "pnpm --filter @workspace/proxy-ui run dev"

[services.env]
PORT = "19585"
BASE_PATH = "/"

[services.production]
publicDir = "artifacts/proxy-ui/dist/public"
serve = "static"
